server:
  port: 5020

spring:
  application:
    name: gofu-server-cloud
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
      location: ${user.dir}/.multipart-temp
  # 上下文权威源：SQLite 本地文件库，沿用 ele 的零运维方案
  datasource:
    url: jdbc:sqlite:${user.dir}/gofu-cloud.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

# ── ele 生图线配置（prefix app，对公众产品线）──
# 密钥全走环境变量占位，不硬编码（安全护栏）。IDEA 里配 Run Configuration 环境变量。
app:
  gemini:
    api-key: "${GEMINI_API_KEY:}"
    model: "gemini-3.1-flash-image-preview"
    base-url: "https://api.linapi.net"
    image-base-url: "https://generativelanguage.googleapis.com/v1beta/models/"
  dashscope:
    api-key: "${DASHSCOPE_API_KEY:}"
    model: "wan2.7-image-pro"
    image-size: "1024*1024"
  siliconflow:
    api-key: "${SILICONFLOW_API_KEY:}"
    model: "hy-image-v3.0"
  qwen:
    api-key: "${DASHSCOPE_API_KEY:}"
    model: "qwen-vl-max"
    base-url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  gpt-image:
    # List<String> 类型：环境变量注入用 APP_GPT-IMAGE_API-KEYS_0 / _1...，或在 application-local.yml 填 [k1,k2]
    api-keys: []
    base-url: "https://api.linapi.net"
  # 腾讯云 COS（不配则生图产物降级存本地路径，ADR-008 的 key/降级逻辑仍生效）
  cos:
    secret-id: "${COS_SECRET_ID:}"
    secret-key: "${COS_SECRET_KEY:}"
    region: "${COS_REGION:ap-guangzhou}"
    bucket: "${COS_BUCKET:}"
  proxy:
    host: "${IMG_PROXY_HOST:}"
    port: ${IMG_PROXY_PORT:8086}
  paths:
    user-data-dir: "${user.dir}"
    output-dir: "./生成结果"
    temp-output-dir: "./.temp-output"
    reference-dir: "./大参考"
    prompts-dir: "./prompts"
  api:
    delay-seconds: 0
    timeout-seconds: 60
    max-retries: 2
    max-concurrent: 20

# ── LY 生图线配置（prefix ly-image，合作公司产品线，与 app.* 隔离）──
ly-image:
  gpt-image:
    provider: "${LY_IMG_PROVIDER:gemini}"        # gemini | openai
    base-url: "${LY_IMG_BASE_URL:https://generativelanguage.googleapis.com}"
    model: "${LY_IMG_MODEL:gemini-2.5-flash-image}"
    keys: "${LY_IMG_KEYS:}"                       # gemini 路径：逗号分隔多 key（String 类型，可用环境变量）
    api-keys: []                                  # openai 路径：List<String>，在 application-local.yml 填 [k1,k2]
    proxy-host: "${LY_IMG_PROXY_HOST:}"
    proxy-port: ${LY_IMG_PROXY_PORT:0}
  # 文本 LLM（卖点提取/SKU规划/标题生成）——LyTextService→geminiText 用
  text:
    base-url: "${LY_TEXT_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}"
    model: "${LY_TEXT_MODEL:qwen-vl-plus}"
    api-key: "${LY_TEXT_API_KEY:}"
  paths:
    user-data-dir: "${user.dir}"

logging:
  level:
    com.gofu.cloud: INFO
