<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOFU-AI 融合工作台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font: 14px/1.5 "Segoe UI", "Microsoft YaHei", sans-serif; }
    body { display: flex; flex-direction: column; }
    .tabbar {
      display: flex; align-items: center; gap: 4px; background: #1f2430; padding: 0 12px;
      height: 46px; flex-shrink: 0; box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .brand { color: #fff; font-weight: 700; margin-right: 16px; font-size: 15px; letter-spacing: .5px; }
    .tab {
      color: #b7bdc9; background: transparent; border: none; padding: 8px 18px; cursor: pointer;
      font-size: 14px; border-radius: 6px 6px 0 0; height: 46px;
    }
    .tab:hover { color: #fff; background: #2a3040; }
    .tab.active { color: #fff; background: #f5f6f8; font-weight: 600; }
    .tab.active.yuren { color: #2563eb; }
    .tab.active.leyu { color: #c2410c; }
    .tab.active.preview { color: #16a34a; }
    .spacer { flex: 1; }
    .cid-box { display: flex; align-items: center; gap: 6px; color: #b7bdc9; font-size: 12px; }
    .cid-box input {
      width: 200px; padding: 4px 8px; border: 1px solid #3a4150; border-radius: 5px;
      background: #2a3040; color: #fff; font-size: 12px;
    }
    .frames { flex: 1; position: relative; background: #f5f6f8; }
    .frames iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none;
    }
    .frames iframe.active { display: block; }
  </style>
</head>
<body>
  <div class="tabbar">
    <span class="brand">GOFU-AI</span>
    <button class="tab yuren active" data-tab="yuren" onclick="switchTab('yuren')">羽刃 · 生图</button>
    <button class="tab leyu" data-tab="leyu" onclick="switchTab('leyu')">乐羽 · 上新</button>
    <button class="tab preview" data-tab="preview" onclick="switchTab('preview')">预览 · 合流</button>
    <span class="spacer"></span>
    <div class="cid-box">
      商品ID
      <input id="cid" placeholder="ProductContext ID" oninput="saveCid()" />
    </div>
  </div>
  <div class="frames">
    <iframe id="f-yuren" class="active" src="yuren/index.html"></iframe>
    <iframe id="f-leyu" src="leyu/index.html"></iframe>
    <iframe id="f-preview" src="preview.html"></iframe>
  </div>

  <script>
    // 三页共享 contextId（localStorage）。预览页/编排产出的 ID 填这里，切到乐羽/羽刃时可带上。
    const CID_KEY = 'gofu_context_id';
    function saveCid() {
      localStorage.setItem(CID_KEY, document.getElementById('cid').value.trim());
    }
    function loadCid() {
      const v = localStorage.getItem(CID_KEY) || '';
      document.getElementById('cid').value = v;
    }
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t =>
        t.classList.toggle('active', t.dataset.tab === name));
      document.querySelectorAll('.frames iframe').forEach(f =>
        f.classList.toggle('active', f.id === 'f-' + name));
    }
    loadCid();
  </script>
</body>
</html>
